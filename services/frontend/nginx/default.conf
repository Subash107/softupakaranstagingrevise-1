server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 512;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

  location ~* \.(?:css|js|mjs|json|svg|woff|woff2|ttf)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~* \.(?:png|jpg|jpeg|gif|webp|avif|ico)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
