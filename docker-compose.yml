services:
  backend:
    build: ./services/backend
    ports:
      - "4000:4000"
    env_file:
      - ./services/backend/.env.example
    volumes:
      - ./services/backend/data:/app/data
      - ./services/backend/uploads:/app/uploads
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-161160759250-tvcu3a09i8gtdeaia6gpk04jo343oiet.apps.googleusercontent.com}

  frontend:
    build: ./services/frontend
    ports:
      - "8080:80"
      - "8085:80"
    depends_on:
      - backend

  django_admin:
    build: ./services/django-admin
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend/data:/data/backend:delegated
      - ./services/django-admin:/app
    environment:
      DJANGO_DB_PATH: /data/backend/softupakaran.db
